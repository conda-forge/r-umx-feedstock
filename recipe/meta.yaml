{% set version = "4.59.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-umx
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/umx_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/umx/umx_{{ version }}.tar.gz
  sha256: 4f89cdfc95579efaa9d19de66724ca4870e3663f6e8d39c8b0e8225f07f7e7b3

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-diagrammer
    - r-mass
    - r-matrix
    - r-mumin
    - r-openmx >=2.19.0
    - r-r2html
    - r-rcurl
    - r-cowplot
    - r-foreign
    - r-gert
    - r-ggplot2
    - r-hrbrthemes
    - r-kableextra
    - r-knitr
    - r-lavaan
    - r-mvtnorm
    - r-nlme
    - r-openxlsx
    - r-paran
    - r-polycor
    - r-psych
    - r-psychtools
    - r-pwr
    - r-rmarkdown
    - r-scales
    - r-xtable
  run:
    - r-base
    - r-diagrammer
    - r-mass
    - r-matrix
    - r-mumin
    - r-openmx >=2.19.0
    - r-r2html
    - r-rcurl
    - r-cowplot
    - r-foreign
    - r-gert
    - r-ggplot2
    - r-hrbrthemes
    - r-kableextra
    - r-knitr
    - r-lavaan
    - r-mvtnorm
    - r-nlme
    - r-openxlsx
    - r-paran
    - r-polycor
    - r-psych
    - r-psychtools
    - r-pwr
    - r-rmarkdown
    - r-scales
    - r-xtable

test:
  commands:
    - $R -e "library('umx')"           # [not win]
    - "\"%R%\" -e \"library('umx')\""  # [win]

about:
  home: https://github.com/tbates/umx
  license: GPL-3.0-only
  summary: Quickly create, run, and report structural equation and twin models. See '?umx' for help, and umx_open_CRAN_page("umx") for NEWS.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - khusmann
